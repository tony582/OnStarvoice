# /etc/nginx/sites-available/voice.minilife.online
# OnStarVoice —— Express 自己托管 /admin、/api、/images,nginx 全量反代到 3002 即可。
# 放好后:  ln -s /etc/nginx/sites-available/voice.minilife.online /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
#          certbot --nginx -d voice.minilife.online   # certbot 会自动补 443 + 跳转
server {
    listen 80;
    server_name voice.minilife.online;

    client_max_body_size 50m;          # 封面/快照体积

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
