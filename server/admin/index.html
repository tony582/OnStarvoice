<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarVoice 星语｜舆情作战台</title>
  <meta name="description" content="StarVoice 星语舆情监控系统管理后台">
  <link rel="stylesheet" href="admin.css">
  <script>
    // Keep enterprise light as the default. Dark mode is opt-in only.
    (function() {
      var saved = localStorage.getItem('osv_theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <div id="loginView" class="login-view">
    <form class="login-panel" onsubmit="event.preventDefault(); login();">
      <img src="/images/logo-starvoice.svg" alt="StarVoice 星语" class="brand-mark">
      <h1>StarVoice 星语</h1>
      <p>舆情作战台</p>
      <label>
        邮箱
        <input id="loginEmail" type="email" autocomplete="username" placeholder="admin@example.com" autofocus>
      </label>
      <label>
        密码
        <input id="loginPassword" type="password" autocomplete="current-password" placeholder="请输入密码">
      </label>
      <button class="primary wide" type="submit">登录</button>
      <div id="loginError" class="form-error"></div>
    </form>
  </div>

  <div id="appView" class="app-shell" hidden>
    <aside class="sidebar">
      <div class="sidebar-head">
        <img src="/images/logo-starvoice.svg" alt="StarVoice 星语" class="brand-icon">
        <div>
          <strong>StarVoice 星语</strong>
          <span>Opinion Ops</span>
        </div>
      </div>
      <nav id="navList" class="nav-list"></nav>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <div id="pageEyebrow" class="eyebrow">Workspace</div>
          <h1 id="pageTitle">总览</h1>
        </div>
        <div class="topbar-actions">
          <select id="tenantSelect" onchange="switchTenant(this.value)"></select>
          <span id="userBadge" class="user-badge"></span>
          <button class="ghost" onclick="logout()">退出</button>
        </div>
      </header>

      <section id="pageContent" class="page-content"></section>
    </main>
  </div>

  <aside id="drawer" class="drawer" hidden>
    <div class="drawer-head">
      <div>
        <div id="drawerEyebrow" class="eyebrow"></div>
        <h2 id="drawerTitle"></h2>
      </div>
      <button class="icon-btn" onclick="closeDrawer()" aria-label="关闭">×</button>
    </div>
    <div id="drawerBody" class="drawer-body"></div>
  </aside>
  <div id="drawerScrim" class="drawer-scrim" hidden onclick="closeDrawer()"></div>

  <div id="toastHost" class="toast-host"></div>
  <script src="admin.js"></script>
</body>
</html>
