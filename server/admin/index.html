<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnStarVoice 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <!-- 登录遮罩 -->
  <div id="loginOverlay" class="login-overlay">
    <div class="login-card">
      <div class="login-logo">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="url(#g1)"/>
          <path d="M14 24c0-5.5 4.5-10 10-10s10 4.5 10 10-4.5 10-10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          <path d="M30 18l4-4M34 14l-2 6-4-2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="24" cy="24" r="3" fill="#fff"/>
          <defs><linearGradient id="g1" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#00B4D8"/><stop offset="1" stop-color="#0077B6"/></linearGradient></defs>
        </svg>
      </div>
      <h2>OnStarVoice 管理后台</h2>
      <p class="login-subtitle">请输入管理密码</p>
      <input type="password" id="loginPassword" placeholder="管理密码" autofocus>
      <button id="loginBtn" onclick="doLogin()">登 录</button>
      <p id="loginError" class="login-error" style="display:none">密码错误</p>
    </div>
  </div>

  <!-- 主界面 -->
  <div id="app" class="app" style="display:none">
    <!-- 侧边导航 -->
    <nav class="sidebar">
      <div class="sidebar-brand">
        <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="url(#g2)"/>
          <circle cx="24" cy="24" r="3" fill="#fff"/>
          <path d="M14 24c0-5.5 4.5-10 10-10s10 4.5 10 10-4.5 10-10 10" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
          <defs><linearGradient id="g2" x1="0" y1="0" x2="48" y2="48"><stop stop-color="#00B4D8"/><stop offset="1" stop-color="#0077B6"/></linearGradient></defs>
        </svg>
        <span>OnStarVoice</span>
      </div>
      <ul class="sidebar-nav">
        <li class="active" data-page="dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>仪表盘</span>
        </li>
        <li data-page="auth-codes">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/><circle cx="12" cy="16" r="1"/></svg>
          <span>激活码管理</span>
        </li>
        <li data-page="records">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>数据浏览</span>
        </li>
        <li data-page="alerts">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span>预警中心</span>
        </li>
        <li data-page="settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>系统设置</span>
        </li>
      </ul>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
      <!-- 仪表盘 -->
      <section id="pageDashboard" class="page">
        <div class="page-header">
          <h1>仪表盘</h1>
          <select id="dashboardDays" onchange="loadDashboard()">
            <option value="1">最近 1 天</option>
            <option value="7" selected>最近 7 天</option>
            <option value="30">最近 30 天</option>
          </select>
        </div>
        <div id="dashboardStats" class="stats-grid">
          <div class="stat-card"><div class="stat-value" id="statTotal">-</div><div class="stat-label">总舆情量</div></div>
          <div class="stat-card stat-negative"><div class="stat-value" id="statRecent">-</div><div class="stat-label">期内新增</div></div>
          <div class="stat-card stat-warning"><div class="stat-value" id="statAlerts">-</div><div class="stat-label">预警数</div></div>
          <div class="stat-card stat-success"><div class="stat-value" id="statCodes">-</div><div class="stat-label">有效激活码</div></div>
        </div>
        <div class="dashboard-grid">
          <div class="card">
            <h3>情感分布</h3>
            <div id="sentimentChart" class="chart-placeholder"></div>
          </div>
          <div class="card">
            <h3>问题分类</h3>
            <div id="categoryChart" class="chart-placeholder"></div>
          </div>
        </div>
        <div class="card">
          <h3>高互动内容 TOP 10</h3>
          <div id="topInteractionTable"></div>
        </div>
      </section>

      <!-- 激活码管理 -->
      <section id="pageAuthCodes" class="page" style="display:none">
        <div class="page-header">
          <h1>激活码管理</h1>
          <button class="btn btn-primary" onclick="showCreateCodeModal()">+ 创建激活码</button>
        </div>
        <div id="authCodesTable" class="table-container"></div>
      </section>

      <!-- 数据浏览 -->
      <section id="pageRecords" class="page" style="display:none">
        <div class="page-header">
          <h1>数据浏览</h1>
          <div class="filters">
            <select id="filterPlatform" onchange="loadRecords()">
              <option value="">全部平台</option>
              <option value="xiaohongshu">小红书</option>
              <option value="douyin">抖音</option>
              <option value="weibo">微博</option>
            </select>
            <select id="filterSentiment" onchange="loadRecords()">
              <option value="">全部情感</option>
              <option value="positive">正面</option>
              <option value="neutral">中性</option>
              <option value="negative">负面</option>
            </select>
            <select id="filterCategory" onchange="loadRecords()">
              <option value="">全部分类</option>
              <option value="safety_rescue">安全救援</option>
              <option value="feature_usage">功能使用</option>
              <option value="renewal_billing">续费收费</option>
              <option value="privacy">隐私安全</option>
              <option value="app_issue">App问题</option>
              <option value="service_quality">服务质量</option>
              <option value="brand_image">品牌形象</option>
            </select>
            <input type="text" id="filterKeyword" placeholder="搜索关键词..." onkeyup="if(event.key==='Enter')loadRecords()">
            <button class="btn btn-secondary" onclick="exportRecordsCsv()" title="导出当前筛选结果为 CSV">导出 CSV</button>
          </div>
        </div>
        <div id="recordsTable" class="table-container"></div>
        <div id="recordsPagination" class="pagination"></div>
      </section>

      <!-- 预警中心 -->
      <section id="pageAlerts" class="page" style="display:none">
        <div class="page-header">
          <h1>预警中心</h1>
          <select id="filterAlertLevel" onchange="loadAlerts()">
            <option value="">全部级别</option>
            <option value="critical">重度</option>
            <option value="warning">中度</option>
            <option value="info">轻度</option>
          </select>
        </div>
        <div id="alertsTable" class="table-container"></div>
      </section>

      <!-- 系统设置 -->
      <section id="pageSettings" class="page" style="display:none">
        <div class="page-header"><h1>系统设置</h1></div>
        <div class="settings-grid">
          <!-- LLM 配置 -->
          <div class="card settings-card">
            <h3>AI 模型配置</h3>
            <div class="form-group">
              <label>LLM 提供商</label>
              <select id="settingLlmProvider">
                <option value="gemini">Google Gemini</option>
                <option value="openai">OpenAI</option>
                <option value="deepseek">DeepSeek</option>
                <option value="qianwen">通义千问</option>
              </select>
            </div>
            <div class="form-group">
              <label>API Key</label>
              <input type="password" id="settingLlmApiKey" placeholder="输入 API Key">
            </div>
            <div class="form-group">
              <label>模型名称</label>
              <input type="text" id="settingLlmModel" placeholder="如 gemini-2.0-flash">
            </div>
            <div class="form-group">
              <label>自定义端点 (可选)</label>
              <input type="text" id="settingLlmEndpoint" placeholder="https://api.example.com/v1">
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" onclick="saveSettings('llm')">保存 AI 配置</button>
              <button class="btn btn-secondary" onclick="runLabeling()">立即标签</button>
            </div>
          </div>

          <!-- 邮件配置 -->
          <div class="card settings-card">
            <h3>邮件通知配置</h3>
            <div class="form-group">
              <label>SMTP 服务器</label>
              <input type="text" id="settingSmtpHost" placeholder="smtp.qq.com">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>端口</label>
                <input type="number" id="settingSmtpPort" placeholder="465">
              </div>
              <div class="form-group">
                <label>SSL</label>
                <select id="settingSmtpSecure">
                  <option value="true">开启</option>
                  <option value="false">关闭</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>SMTP 用户名</label>
              <input type="text" id="settingSmtpUser" placeholder="your-email@qq.com">
            </div>
            <div class="form-group">
              <label>SMTP 密码/授权码</label>
              <input type="password" id="settingSmtpPass" placeholder="SMTP 授权码">
            </div>
            <div class="form-group">
              <label>发件人</label>
              <input type="text" id="settingEmailFrom" placeholder="OnStarVoice <email@qq.com>">
            </div>
            <div class="form-group">
              <label>收件人 (多个用逗号分隔)</label>
              <input type="text" id="settingEmailTo" placeholder="admin@example.com">
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" onclick="saveSettings('email')">保存邮件配置</button>
              <button class="btn btn-secondary" onclick="testEmail()">发送测试邮件</button>
            </div>
          </div>

          <!-- 预警配置 -->
          <div class="card settings-card">
            <h3>预警阈值配置</h3>
            <div class="form-group">
              <label>高互动阈值 (总互动量)</label>
              <input type="number" id="settingAlertThreshold" placeholder="500">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>集中负面条数</label>
                <input type="number" id="settingAlertBurstCount" placeholder="5">
              </div>
              <div class="form-group">
                <label>时间窗口 (分钟)</label>
                <input type="number" id="settingAlertBurstWindow" placeholder="60">
              </div>
            </div>
            <div class="form-group">
              <label>高危关键词 (逗号分隔)</label>
              <textarea id="settingAlertKeywords" rows="3" placeholder="安全,隐私,泄露,事故,召回"></textarea>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" onclick="saveSettings('alert')">保存预警配置</button>
            </div>
          </div>

          <!-- 报表配置 -->
          <div class="card settings-card">
            <h3>报表配置</h3>
            <div class="form-row">
              <div class="form-group">
                <label>日报</label>
                <select id="settingReportDaily">
                  <option value="true">开启</option>
                  <option value="false">关闭</option>
                </select>
              </div>
              <div class="form-group">
                <label>周报</label>
                <select id="settingReportWeekly">
                  <option value="true">开启</option>
                  <option value="false">关闭</option>
                </select>
              </div>
            </div>
            <div class="form-actions">
              <button class="btn btn-primary" onclick="saveSettings('report')">保存报表配置</button>
              <button class="btn btn-secondary" onclick="generateReport('daily')">生成日报</button>
              <button class="btn btn-secondary" onclick="generateReport('weekly')">生成周报</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- 创建激活码弹窗 -->
  <div id="createCodeModal" class="modal-overlay modal-hidden">
    <div class="modal-card">
      <h3>创建激活码</h3>
      <div class="form-group">
        <label>类型</label>
        <select id="newCodeType" onchange="updateDurationHint()">
          <option value="trial">试用 (7天)</option>
          <option value="annual">年度 (365天)</option>
          <option value="permanent">永久</option>
        </select>
      </div>
      <div class="form-group">
        <label>自定义天数</label>
        <input type="number" id="newCodeDays" placeholder="默认按类型" min="1">
      </div>
      <div class="form-group">
        <label>客户邮箱</label>
        <input type="text" id="newCodeEmail" placeholder="可选">
      </div>
      <div class="form-group">
        <label>客户名称</label>
        <input type="text" id="newCodeName" placeholder="可选">
      </div>
      <div class="form-group">
        <label>最大绑定数</label>
        <input type="number" id="newCodeBindings" value="3" min="1">
      </div>
      <div class="form-group">
        <label>备注</label>
        <input type="text" id="newCodeNotes" placeholder="可选">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('createCodeModal')">取消</button>
        <button class="btn btn-primary" onclick="createAuthCode()">创建</button>
      </div>
    </div>
  </div>

  <!-- 记录详情弹窗 -->
  <div id="recordDetailModal" class="modal-overlay modal-hidden">
    <div class="modal-card modal-lg">
      <div class="modal-header">
        <h3>记录详情</h3>
        <button class="modal-close" onclick="closeModal('recordDetailModal')">&times;</button>
      </div>
      <div id="recordDetailContent" class="record-detail-content"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal('recordDetailModal')">关闭</button>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
