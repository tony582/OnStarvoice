services:
  postgres:
    image: postgres:16
    container_name: onstarvoice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: onstarvoice
      POSTGRES_USER: onstarvoice
      POSTGRES_PASSWORD: onstarvoice
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - onstarvoice-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onstarvoice -d onstarvoice"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  onstarvoice-postgres-data:
